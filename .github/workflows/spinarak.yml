name: Spinarak bot

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [ 'main' ] 
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a screenshot per location even if no slots are found'
        type: boolean
        default: false

jobs:
  run-spinarak:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        # font package needed for Japanese to render in captured screenshots
        sudo apt-get install fonts-noto-cjk
        pip install pydoll-python pyvirtualdisplay beautifulsoup4 requests
        
    - name: Run Python Selenium script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TEST_MODE: ${{ inputs.test_mode }}
      run: |
          echo -e "current NAT'd source IP address: `curl -s api.ipify.org`\n\n"
          python spinarak.py
          ls -al
          
    - name: Check if there are any changes
      id: verify_diff
      run: |
          git add --all
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT
          
    - name: Commit & push screenshot to repo
      if: steps.verify_diff.outputs.changed == 'true'
      run: |
          git config --global user.name '${{github.actor}}'
          git config --global user.email '${{github.actor}}@users.noreply.github.com'
          git add --all
          git commit -am "Screenshot(s)"
          #git pull
          git push --force
